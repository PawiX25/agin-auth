services:
    valkey:
        image: valkey/valkey:latest
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - ./cache:/data
    postgres:
        image: postgres:17
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: agin
            POSTGRES_PASSWORD: agin
            POSTGRES_DB: agin_auth
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata:
